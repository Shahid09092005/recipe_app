<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page}}</title>

    <style>
        /* Navbar styling */
        nav {
            background-color: #4CAF50;
             {% comment %} background: #2563eb; {% endcomment %}
            padding: 10px 20px;
            font-family: Arial, sans-serif;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 8px 15px;
        }

        nav ul li a:hover {
            background-color: #050606;
            border-radius: 5px;
        }

        /* Basic table styling */
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        caption {
            font-size: 1.2em;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/recipe/">Recipe</a></li>

        {% comment %}
        <li><a href="/get_student_report/">Student Report</a></li>
        {% endcomment %}

        {% if request.user.is_authenticated %}
            <li><a href="/user_logout/">Logout</a></li>
        {% else %}
            <li><a href="/user_register/">Register</a></li>
            <li><a href="/user_login/">Login</a></li>
        {% endif %}
    </ul>
</nav>

    {% block start %}

    {% endblock %}

</body>

<script>

</script>

</html>
